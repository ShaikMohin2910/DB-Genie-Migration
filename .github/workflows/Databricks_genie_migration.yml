# .github/workflows/dynamic-genie-migration.yml
# ADDED a debug step to prove the contents of databricks.yml

name: "Dynamic Databricks Genie Migration (Windows)"

on:
  workflow_dispatch:
    inputs:
      source_genie_space_id:
        description: 'The ID of the source Genie Workspace to clone'
        required: true
        default: '01f1072f05b914caa84f451e2cb288e2'
      source_catalog:
        description: 'The name of the source catalog (e.g., adm_demo)'
        required: true
        default: 'adm_demo'
      target_catalog:
        description: 'The name of the target catalog (e.g., test1)'
        required: true
        default: 'test1'

jobs:
  migrate-genie-workspace:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      # --- THIS IS THE NEW DEBUGGING STEP ---
      - name: Debug databricks.yml content
        working-directory: ./DB-Genie-Migration
        shell: bash
        run: |
          echo "--- Start of databricks.yml ---"
          cat databricks.yml
          echo "--- End of databricks.yml ---"
          echo "Debug step complete. The next step will now run."

      # --- DEPLOY STEP ---
      - name: Deploy Databricks Bundle with Dynamic Parameters
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        
        working-directory: ./DB-Genie-Migration
        
        shell: bash
        run: |
          NEW_NAME="Migrated Space - ${{ github.event.inputs.target_catalog }}"
          
          databricks bundle deploy --target dev \
            --var="source_genie_space_id=${{ github.event.inputs.source_genie_space_id }}" \
            --var="source_catalog_name=${{ github.event.inputs.source_catalog }}" \
            --var="target_catalog_name=${{ github.event.inputs.target_catalog }}" \
            --var="new_genie_space_name=$NEW_NAME"
