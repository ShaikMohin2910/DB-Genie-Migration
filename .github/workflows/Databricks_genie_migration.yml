# .github/workflows/dynamic-genie-migration.yml
# CORRECTED to handle the nested project directory structure.

name: "Dynamic Databricks Genie Migration (Windows)"

on:
  workflow_dispatch:
    inputs:
      source_genie_space_id:
        description: 'The ID of the source Genie Workspace to clone'
        required: true
        default: '01f1072f05b914caa84f451e2cb288e2'
      source_catalog:
        description: 'The name of the source catalog (e.g., adm_demo)'
        required: true
        default: 'adm_demo'
      target_catalog:
        description: 'The name of the target catalog (e.g., test1)'
        required: true
        default: 'test1'

jobs:
  migrate-genie-workspace:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      - name: Deploy Databricks Bundle with Dynamic Parameters
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        
        # THIS IS THE FIX: Tell this step to run from inside the nested folder
        # where your databricks.yml file is located.
        working-directory: ./DB-Genie-Migration
        
        shell: bash
        run: |
          # Construct the dynamic name for the new Genie Space
          NEW_NAME="Migrated Space - ${{ github.event.inputs.target_catalog }}"
          
          # Deploy the bundle, overriding the variables
          databricks bundle deploy --target dev --vars "{
            \"source_genie_space_id\": \"${{ github.event.inputs.source_genie_space_id }}\",
            \"source_catalog_name\": \"${{ github.event.inputs.source_catalog }}\",
            \"target_catalog_name\": \"${{ github.event.inputs.target_catalog }}\",
            \"new_genie_space_name\": \"$NEW_NAME\"
          }"
